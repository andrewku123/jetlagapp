const COLORS = {BART:"#0066cc", Caltrain:"#d4001a", VTA:"#f5821f", Muni:"#7b2d8b"};
const ORDER = ["BART","Caltrain","VTA","Muni"];
function colorFor(sy){ for(const s of ORDER) if(sy.includes(s)) return COLORS[s]; return "#555"; }
const map = L.map("map",{preferCanvas:true}).setView([37.62,-122.18],10);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap"}).addTo(map);
const group=[];
for(const s of STATIONS){
  const m=L.circleMarker([s.la,s.lo],{radius:5,weight:1,color:"#222",fillColor:colorFor(s.sy),fillOpacity:.95});
  m.bindPopup("<b>"+s.n+"</b><br>"+s.sy.join(" + "));
  m.bindTooltip(s.n,{permanent:false,direction:"top",className:"station-label"});
  m.addTo(map); group.push(m);
}
const legend=L.control({position:"bottomright"});
legend.onAdd=function(){
  const d=L.DomUtil.create("div","legend");
  let h="<h3>Eligible stations ("+STATIONS.length+")</h3>";
  const counts={}; for(const s of STATIONS) for(const k of ORDER) if(s.sy.includes(k)) counts[k]=(counts[k]||0)+1;
  for(const k of ORDER) h+='<div class="row"><i style="background:'+COLORS[k]+'"></i>'+k+" ("+(counts[k]||0)+")</div>";
  h+='<div style="margin-top:6px;color:#555">Hide only at these stations.<br>Travel by any transit.</div>';
  d.innerHTML=h; return d;
};
legend.addTo(map);
map.fitBounds(L.featureGroup(group).getBounds().pad(.05));
