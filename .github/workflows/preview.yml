name: Deploy PR previews

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

# contents: write to push the preview into gh-pages; pull-requests: write so the
# action can leave the preview-link comment.
permissions:
  contents: write
  pull-requests: write

# Share the gh-pages write lock with the production deploy (see deploy.yml).
concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install and build
        if: github.event.action != 'closed'
        env:
          # asset URLs must resolve under the preview path
          BASE: /${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.number }}/
        run: |
          npm ci
          npm run build
      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1.8.1
        with:
          source-dir: ./dist/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          qr-code: true
