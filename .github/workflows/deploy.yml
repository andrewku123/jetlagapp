name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# contents: write so the built site can be published to the gh-pages branch.
permissions:
  contents: write

# Serialise every write to gh-pages (production deploy + PR previews share this
# group) so concurrent runs never clobber each other's git push.
concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        env:
          BASE: /${{ github.event.repository.name }}/
        run: npm run build
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          # keep PR-preview folders (and other non-root files) intact when the
          # production site is republished.
          keep_files: true
